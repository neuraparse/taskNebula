# TaskNebula Proxy Configuration for System Nginx
server {
    listen 80;
    server_name tasknebula.nowflow.io;

    # Security Headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Client max body size for file uploads
    client_max_body_size 50M;

    # Proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Proxy to TaskNebula container nginx HTTPS
    location / {
        proxy_pass https://127.0.0.1:8445;
        proxy_ssl_verify off;  # Since we're using self-signed cert
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Health check endpoint
    location /api/health {
        proxy_pass https://127.0.0.1:8445/api/health;
        proxy_ssl_verify off;
        access_log off;
    }
}
