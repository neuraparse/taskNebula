# TaskNebula global nginx hardening — rate limit zones + scanner block map
# Copy to /etc/nginx/conf.d/tasknebula-hardening.conf

server_tokens off;

# Rate limit zones (IP-based)
limit_req_zone $binary_remote_addr zone=tasknebula_strict:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=tasknebula_api:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=tasknebula_public:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=tasknebula_conn:10m;

# Scanner path blocks
map $request_uri $tasknebula_block_path {
    default 0;
    ~*^/(wp-admin|wp-login|wp-includes|xmlrpc\.php|phpmyadmin|\.env|\.git|\.aws|cgi-bin) 1;
    ~*\.(sql|bak|log|swp|ini|sh)$ 1;
}
