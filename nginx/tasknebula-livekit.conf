# TaskNebula Community — LiveKit WebSocket TLS termination (nginx vhost)
#
# LiveKit bundles plain ws:// on port 7880 — browsers on an https:// page
# refuse mixed-content wss:// when the port has no TLS. Put nginx in
# front on a dedicated subdomain so it terminates TLS and proxies the
# WebSocket upgrade to the LiveKit container.
#
# Steps for self-hosted operators:
#   1. DNS: add an A / AAAA record for livekit.your-domain.example.com → server IP.
#   2. Copy this file to /etc/nginx/sites-available/livekit.your-domain.example.com
#      and symlink it into /etc/nginx/sites-enabled/.
#   3. Replace every "livekit.your-domain.example.com" below with your real host.
#   4. Get a cert:
#        sudo certbot --nginx -d livekit.your-domain.example.com
#   5. nginx -t && sudo nginx -s reload
#   6. In your TaskNebula .env set:
#        NEXT_PUBLIC_LIVEKIT_URL=wss://livekit.your-domain.example.com
#      Rebuild web container so the build-arg is baked in:
#        docker compose up -d --build web
#
# Requires the existing /etc/nginx/conf.d/tasknebula-hardening.conf
# (for the tasknebula_conn rate-limit zone).

map $http_upgrade $livekit_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name livekit.your-domain.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name livekit.your-domain.example.com;

    ssl_certificate     /etc/letsencrypt/live/livekit.your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.your-domain.example.com/privkey.pem;

    # Match the main vhost's TLS hygiene.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    limit_conn tasknebula_conn 100;

    # Client body limits are irrelevant for WebSocket but set sane defaults.
    client_max_body_size 10M;

    # LiveKit's WebSocket signalling (RTC) + HTTP Twirp services all live
    # at the root of the 7880 port. Proxy everything with upgrade headers
    # so WebSocket frames are not buffered or closed.
    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $livekit_connection_upgrade;

        # WebSockets can be idle for minutes between frames; keep them open.
        proxy_read_timeout  24h;
        proxy_send_timeout  24h;
        proxy_connect_timeout 30s;

        proxy_buffering off;
        proxy_cache off;
    }
}
