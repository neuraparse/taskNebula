services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: tasknebula-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tasknebula}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tasknebula-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:v1.10.1
    container_name: tasknebula-livekit
    restart: unless-stopped
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ['/bin/sh', '/etc/livekit/start-livekit.sh']
    environment:
      LIVEKIT_NODE_IP: ${LIVEKIT_NODE_IP:-}
      LIVEKIT_PORT: ${LIVEKIT_PORT:-7880}
      LIVEKIT_TCP_PORT: ${LIVEKIT_TCP_PORT:-7881}
      LIVEKIT_TURN_UDP_PORT: ${LIVEKIT_TURN_UDP_PORT:-3478}
      LIVEKIT_RTC_START_PORT: ${LIVEKIT_RTC_START_PORT:-50000}
      LIVEKIT_RTC_END_PORT: ${LIVEKIT_RTC_END_PORT:-50020}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-tasknebula-dev}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-tasknebula-livekit-secret-local-2026}
      LIVEKIT_WEBHOOK_URL: ${LIVEKIT_WEBHOOK_URL:-http://127.0.0.1:${PORT:-3000}/api/chat/livekit/webhook}
      REDIS_PORT: ${REDIS_PORT:-6379}
    volumes:
      - ./docker/livekit/start-livekit.sh:/etc/livekit/start-livekit.sh:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AUTH_SECRET: ${AUTH_SECRET:-change-me-generate-with-openssl-rand-base64-32}
        AUTH_URL: ${APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
    container_name: tasknebula-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tasknebula}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-generate-with-openssl-rand-base64-32}
      AUTH_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-TaskNebula}
      REDIS_URL: redis://redis:6379
      LIVEKIT_URL: ${LIVEKIT_URL:-http://host.docker.internal:7880}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://${LIVEKIT_PUBLIC_HOST:-127.0.0.1}:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-tasknebula-dev}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-tasknebula-livekit-secret-local-2026}
      TURN_URL: ${TURN_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}
      # OAuth (optional)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SKIP_SEED: ${SKIP_SEED:-false}
      NODE_ENV: production
      # Email / SMTP (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      EMAIL_FROM: ${EMAIL_FROM:-}
      FEATURE_EMAIL_ENABLED: ${FEATURE_EMAIL_ENABLED:-false}
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - uploads_data:/app/uploads
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  uploads_data:
